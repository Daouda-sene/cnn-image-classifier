<!DOCTYPE html>
<html>
<head>
    <title>Image Classifier</title>
</head>
<body>

    <h1>Intel Image Classification</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
    {% endif %}

</body>
</html>
